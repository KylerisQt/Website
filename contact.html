<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Florence Tech Doc</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        header {
            background: #0a2540;
            color: white;
            text-align: center;
            padding: 20px;
        }

        nav {
            background: #13315c;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            max-width: 900px;
            margin: 20px auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
        }

        h2 {
            text-align: center;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        input, textarea {
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }

        textarea {
            min-height: 120px;
        }

        button {
            background: #007BFF;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .success {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            text-align: center;
        }

        .info {
            text-align: center;
            margin-top: 20px;
        }

        footer {
            background: #0a2540;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }

        /* Honeypot (spam protection) */
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<header>
    <h1>Florence Tech Doc</h1>
    <p>Contact Us</p>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="about.html">About</a>
</nav>

<div class="container">

    <h2>Get in Touch</h2>

    <div class="success" id="successMessage">
        ✅ Your message has been sent! We’ll get back to you soon.
    </div>

    <form id="contactForm" action="https://formspree.io/f/xaqvnprn" method="POST">

        <!-- Spam protection -->
        <input type="text" name="_gotcha" class="hidden">

        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <input type="tel" name="phone" placeholder="Your Phone Number">
        <textarea name="message" placeholder="Describe your issue..." required></textarea>

        <button type="submit">Send Message</button>
    </form>

    <div class="info">
        <p><strong>Email:</strong> florencetechdoc@gmail.com</p>
        <p><strong>Address:</strong> Florence, South Carolina</p>
    </div>

</div>

<footer>
    <p>&copy; 2026 Florence Tech Doc</p>
</footer>

<script>
    const form = document.getElementById('contactForm');
    const successMessage = document.getElementById('successMessage');

    form.addEventListener('submit', async function(e) {
        e.preventDefault();

        const data = new FormData(form);

        const response = await fetch(form.action, {
            method: form.method,
            body: data,
            headers: {
                'Accept': 'application/json'
            }
        });

        if (response.ok) {
            successMessage.style.display = 'block';
            form.reset();
        } else {
            alert("Oops! Something went wrong.");
        }
    });
</script>

</body>
</html>
